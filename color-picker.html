<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Color Dropper</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --bg: #0e0e10;
    --panel: #18181c;
    --panel2: #1e1e24;
    --border: #2a2a30;
    --accent: #e8ff47;
    --red: #ff5252;
    --text: #f0f0f0;
    --muted: #666;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 24px 16px 80px;
  }

  .app { width: 100%; max-width: 460px; }

  .header {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 28px;
  }
  .header h1 {
    font-family: 'Space Mono', monospace;
    font-size: 22px;
    letter-spacing: -0.5px;
    color: var(--accent);
  }
  .header span {
    font-size: 11px;
    color: var(--muted);
    font-weight: 300;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 24px;
    background: var(--panel);
    border-radius: 10px;
    padding: 4px;
    border: 1px solid var(--border);
  }
  .tab {
    flex: 1;
    padding: 9px;
    border: none;
    background: transparent;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    border-radius: 7px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .tab.active {
    background: var(--panel2);
    color: var(--accent);
    border: 1px solid var(--border);
  }
  .tab:hover:not(.active) { color: var(--text); }

  .panel { display: none; }
  .panel.active { display: block; }

  /* Picker */
  .main-swatch {
    width: 100%;
    height: 160px;
    border-radius: 14px;
    border: 1px solid var(--border);
    margin-bottom: 16px;
    transition: background 0.25s, box-shadow 0.25s;
    position: relative;
    overflow: hidden;
    cursor: pointer;
  }
  .main-swatch::after {
    content: 'click to pick';
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Space Mono', monospace;
    font-size: 11px; letter-spacing: 0.08em;
    color: rgba(255,255,255,0.25); text-transform: uppercase;
    opacity: 0; transition: opacity 0.2s;
  }
  .main-swatch:hover::after { opacity: 1; }
  .main-swatch.empty { background: var(--panel) !important; box-shadow: none !important; }
  .main-swatch.empty::before {
    content: ''; position: absolute; inset: 0;
    background: repeating-linear-gradient(45deg,transparent,transparent 8px,rgba(255,255,255,0.02) 8px,rgba(255,255,255,0.02) 16px);
  }

  .values-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 14px;
  }
  .value-box {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    position: relative; overflow: hidden;
  }
  .value-box:hover { border-color: #444; background: var(--panel2); }
  .value-box.full { grid-column: 1 / -1; }
  .value-label {
    font-family: 'Space Mono', monospace;
    font-size: 9px; letter-spacing: 0.12em;
    color: var(--muted); text-transform: uppercase;
    margin-bottom: 5px;
  }
  .value-text {
    font-family: 'Space Mono', monospace;
    font-size: 14px; color: var(--text); font-weight: 700;
  }
  .copy-hint {
    position: absolute; top: 8px; right: 10px;
    font-size: 9px; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.05em;
    opacity: 0; transition: opacity 0.15s;
    font-family: 'Space Mono', monospace;
  }
  .value-box:hover .copy-hint { opacity: 1; }
  .copied-flash {
    position: absolute; inset: 0;
    background: rgba(232,255,71,0.08);
    pointer-events: none; opacity: 0;
    transition: opacity 0.3s; border-radius: inherit;
  }
  .copied-flash.show { opacity: 1; }

  .pick-btn {
    width: 100%; padding: 15px;
    background: var(--accent); color: #0e0e10;
    border: none; border-radius: 10px;
    font-family: 'Space Mono', monospace;
    font-size: 12px; font-weight: 700;
    letter-spacing: 0.05em; text-transform: uppercase;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.1s, box-shadow 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    margin-bottom: 14px;
  }
  .pick-btn:hover { opacity: 0.92; box-shadow: 0 0 28px rgba(232,255,71,0.2); }
  .pick-btn:active { transform: scale(0.98); }
  .pick-btn:disabled { background: #2a2a2a; color: var(--muted); cursor: not-allowed; box-shadow: none; }

  .add-palette-row {
    display: flex; gap: 8px; align-items: center;
  }
  .palette-select {
    flex: 1;
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 10px 12px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    cursor: pointer; outline: none;
    transition: border-color 0.15s;
  }
  .palette-select:focus { border-color: #444; }
  .add-to-palette-btn {
    padding: 10px 14px;
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--accent);
    border-radius: 8px;
    font-family: 'Space Mono', monospace;
    font-size: 10px; letter-spacing: 0.05em; text-transform: uppercase;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    white-space: nowrap;
  }
  .add-to-palette-btn:hover { background: var(--panel2); border-color: #444; }
  .add-to-palette-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  /* Section headers */
  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 12px;
  }
  .section-title {
    font-family: 'Space Mono', monospace;
    font-size: 9px; letter-spacing: 0.12em;
    color: var(--muted); text-transform: uppercase;
  }
  .section-actions { display: flex; gap: 8px; }
  .link-btn {
    background: none; border: none;
    color: var(--muted); font-family: 'Space Mono', monospace;
    font-size: 9px; letter-spacing: 0.06em; text-transform: uppercase;
    cursor: pointer; transition: color 0.15s; padding: 2px 4px;
    border-radius: 3px;
  }
  .link-btn:hover { color: var(--red); }
  .link-btn.active-edit { color: var(--accent); }

  /* Swatches */
  .swatch-row {
    display: flex; flex-wrap: wrap; gap: 7px;
  }
  .h-swatch {
    width: 36px; height: 36px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.07);
    cursor: pointer;
    position: relative; flex-shrink: 0;
    transition: transform 0.15s, border-color 0.15s;
  }
  .h-swatch:hover { border-color: rgba(255,255,255,0.25); z-index: 2; }
  .swatch-row:not(.edit-mode) .h-swatch:hover { transform: scale(1.12); }

  .remove-x {
    display: none;
    position: absolute;
    top: -5px; right: -5px;
    width: 16px; height: 16px;
    background: var(--red);
    border-radius: 50%;
    font-size: 10px; color: #fff;
    align-items: center; justify-content: center;
    z-index: 3; cursor: pointer;
    border: 1.5px solid var(--bg);
    line-height: 1;
  }
  .swatch-row.edit-mode .remove-x { display: flex; }
  .swatch-row.edit-mode .h-swatch { cursor: default; }

  /* Tooltip via title — use data-hex for custom */
  .hex-tip {
    position: absolute;
    bottom: calc(100% + 6px); left: 50%;
    transform: translateX(-50%);
    background: #2a2a30; color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 9px; padding: 3px 7px;
    border-radius: 4px; white-space: nowrap;
    pointer-events: none; opacity: 0;
    transition: opacity 0.15s; z-index: 10;
  }
  .h-swatch:hover .hex-tip { opacity: 1; }

  /* Palettes */
  .new-palette-form {
    display: flex; gap: 8px; margin-bottom: 20px;
  }
  .text-input {
    flex: 1;
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 10px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px; outline: none;
    transition: border-color 0.15s;
  }
  .text-input::placeholder { color: var(--muted); }
  .text-input:focus { border-color: var(--accent); }
  .create-btn {
    padding: 10px 16px;
    background: var(--accent); color: #0e0e10;
    border: none; border-radius: 8px;
    font-family: 'Space Mono', monospace;
    font-size: 11px; font-weight: 700;
    letter-spacing: 0.05em; text-transform: uppercase;
    cursor: pointer; transition: opacity 0.15s;
    white-space: nowrap;
  }
  .create-btn:hover { opacity: 0.88; }

  .palette-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 10px;
    transition: border-color 0.15s;
  }
  .palette-card-header {
    display: flex; align-items: center;
    justify-content: space-between;
    margin-bottom: 12px; gap: 8px;
  }
  .palette-name {
    font-family: 'Space Mono', monospace;
    font-size: 12px; font-weight: 700;
    color: var(--text); letter-spacing: 0.03em;
    border: none; background: transparent;
    outline: none; width: 100%; padding: 2px 0;
    border-bottom: 1px solid transparent;
    transition: border-color 0.15s, color 0.15s;
  }
  .palette-name:focus { border-bottom-color: var(--accent); color: var(--accent); }
  .palette-card-actions { display: flex; gap: 4px; flex-shrink: 0; }
  .icon-btn {
    background: none; border: none;
    color: var(--muted);
    cursor: pointer; padding: 4px 6px;
    border-radius: 4px;
    transition: color 0.15s, background 0.15s;
    font-family: 'Space Mono', monospace;
    font-size: 9px; letter-spacing: 0.04em; text-transform: uppercase;
  }
  .icon-btn:hover { color: var(--red); background: rgba(255,82,82,0.08); }
  .icon-btn.copy-icon:hover { color: var(--accent); background: rgba(232,255,71,0.08); }

  .palette-swatches {
    display: flex; flex-wrap: wrap; gap: 6px; min-height: 36px;
  }
  .p-swatch {
    width: 36px; height: 36px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.07);
    cursor: pointer; position: relative; flex-shrink: 0;
    transition: transform 0.15s, border-color 0.15s;
  }
  .p-swatch:hover { transform: scale(1.1); border-color: rgba(255,255,255,0.25); z-index: 2; }
  .p-swatch .remove-x { display: none; }
  .p-swatch:hover .remove-x { display: flex; }

  .palette-bar {
    width: 100%; height: 6px;
    border-radius: 3px;
    display: flex; gap: 2px;
    margin-top: 12px; overflow: hidden;
  }
  .palette-bar-seg { flex: 1; height: 100%; }

  .empty-state {
    text-align: center; padding: 48px 20px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 11px; letter-spacing: 0.05em; line-height: 1.9;
  }

  .unsupported {
    background: #1a1010;
    border: 1px solid #3a2020;
    border-radius: 10px;
    padding: 14px;
    font-size: 12px; color: #e08080;
    line-height: 1.5;
    font-family: 'Space Mono', monospace;
    display: none; margin-bottom: 14px;
  }

  /* Modal */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.65);
    z-index: 100;
    align-items: center; justify-content: center;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px;
    width: 90%; max-width: 340px;
  }
  .modal h3 {
    font-family: 'Space Mono', monospace;
    font-size: 13px; margin-bottom: 8px; color: var(--text);
  }
  .modal p {
    font-size: 13px; color: var(--muted);
    margin-bottom: 22px; line-height: 1.5;
  }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
  .btn-ghost {
    padding: 9px 16px;
    background: none; border: 1px solid var(--border);
    color: var(--muted); border-radius: 8px;
    font-family: 'Space Mono', monospace;
    font-size: 10px; letter-spacing: 0.05em; text-transform: uppercase;
    cursor: pointer; transition: border-color 0.15s, color 0.15s;
  }
  .btn-ghost:hover { border-color: #444; color: var(--text); }
  .btn-danger {
    padding: 9px 16px;
    background: var(--red); border: none; color: #fff;
    border-radius: 8px;
    font-family: 'Space Mono', monospace;
    font-size: 10px; letter-spacing: 0.05em; text-transform: uppercase;
    cursor: pointer; transition: opacity 0.15s;
  }
  .btn-danger:hover { opacity: 0.85; }

  .toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--accent); color: #0e0e10;
    padding: 10px 20px; border-radius: 8px;
    font-family: 'Space Mono', monospace;
    font-size: 11px; font-weight: 700;
    letter-spacing: 0.08em; text-transform: uppercase;
    opacity: 0; transition: opacity 0.2s, transform 0.2s;
    pointer-events: none; z-index: 999;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <h1>DROPPER</h1>
    <span>screen color picker</span>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('picker')">Picker</button>
    <button class="tab" onclick="switchTab('history')">History</button>
    <button class="tab" onclick="switchTab('palettes')">Palettes</button>
  </div>

  <!-- PICKER -->
  <div class="panel active" id="panel-picker">
    <div class="main-swatch empty" id="mainSwatch" onclick="triggerPick()"></div>

    <div class="values-grid">
      <div class="value-box full" onclick="copyValue('hex')">
        <div class="value-label">HEX</div>
        <div class="value-text" id="hexVal">—</div>
        <div class="copy-hint">copy</div>
        <div class="copied-flash" id="flash-hex"></div>
      </div>
      <div class="value-box" onclick="copyValue('rgb')">
        <div class="value-label">RGB</div>
        <div class="value-text" id="rgbVal">—</div>
        <div class="copy-hint">copy</div>
        <div class="copied-flash" id="flash-rgb"></div>
      </div>
      <div class="value-box" onclick="copyValue('hsl')">
        <div class="value-label">HSL</div>
        <div class="value-text" id="hslVal">—</div>
        <div class="copy-hint">copy</div>
        <div class="copied-flash" id="flash-hsl"></div>
      </div>
    </div>

    <div class="unsupported" id="unsupported">
      ⚠ EyeDropper API not supported. Use Chrome 95+ or Edge 95+.
    </div>

    <button class="pick-btn" id="pickBtn" onclick="triggerPick()">
      <span>🎯</span> Pick Color from Screen
    </button>

    <div class="add-palette-row">
      <select class="palette-select" id="paletteSelect">
        <option value="">— Add to palette —</option>
      </select>
      <button class="add-to-palette-btn" id="addToPaletteBtn" onclick="addCurrentToPalette()" disabled>+ Add</button>
    </div>
  </div>

  <!-- HISTORY -->
  <div class="panel" id="panel-history">
    <div class="section-header" id="historyHeader" style="display:none">
      <span class="section-title">Recent Colors</span>
      <div class="section-actions">
        <button class="link-btn" id="editHistoryBtn" onclick="toggleEditHistory()">Edit</button>
        <button class="link-btn" onclick="confirmClearHistory()">Clear All</button>
      </div>
    </div>
    <div class="swatch-row" id="historySwatches"></div>
    <div class="empty-state" id="historyEmpty">No colors picked yet.<br>Use the Picker tab to get started.</div>
  </div>

  <!-- PALETTES -->
  <div class="panel" id="panel-palettes">
    <div class="new-palette-form">
      <input class="text-input" type="text" id="newPaletteName" placeholder="New palette name…" maxlength="30"
        onkeydown="if(event.key==='Enter')createPalette()">
      <button class="create-btn" onclick="createPalette()">Create</button>
    </div>
    <div id="paletteList"></div>
    <div class="empty-state" id="palettesEmpty">No palettes yet.<br>Create one above.</div>
  </div>

</div>

<!-- Modal -->
<div class="modal-overlay" id="confirmModal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h3 id="modalTitle">Confirm</h3>
    <p id="modalMsg">Are you sure?</p>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn-danger" id="modalConfirmBtn">Delete</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── Storage keys
const LS_HISTORY  = 'dropper_history_v1';
const LS_PALETTES = 'dropper_palettes_v1';

// ── State
let currentColor = null;
let colorHistory = [];
let palettes = [];
let editingHistory = false;

function loadAll() {
  try { colorHistory = JSON.parse(localStorage.getItem(LS_HISTORY)) || []; } catch { colorHistory = []; }
  try { palettes = JSON.parse(localStorage.getItem(LS_PALETTES)) || []; } catch { palettes = []; }
}
function saveHistory()  { localStorage.setItem(LS_HISTORY,  JSON.stringify(colorHistory)); }
function savePalettes() { localStorage.setItem(LS_PALETTES, JSON.stringify(palettes)); }

// ── Color math
function hexToRgb(hex) {
  return { r: parseInt(hex.slice(1,3),16), g: parseInt(hex.slice(3,5),16), b: parseInt(hex.slice(5,7),16) };
}
function rgbToHsl(r,g,b) {
  r/=255; g/=255; b/=255;
  const max=Math.max(r,g,b), min=Math.min(r,g,b);
  let h,s, l=(max+min)/2;
  if(max===min){h=s=0;}
  else{
    const d=max-min;
    s=l>0.5?d/(2-max-min):d/(max+min);
    switch(max){
      case r:h=((g-b)/d+(g<b?6:0))/6;break;
      case g:h=((b-r)/d+2)/6;break;
      case b:h=((r-g)/d+4)/6;break;
    }
  }
  return{h:Math.round(h*360),s:Math.round(s*100),l:Math.round(l*100)};
}

// ── Tabs
function switchTab(name) {
  const names = ['picker','history','palettes'];
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', names[i]===name));
  document.querySelectorAll('.panel').forEach(p => p.classList.toggle('active', p.id==='panel-'+name));
  if(name==='history') renderHistory();
  if(name==='palettes') renderPalettes();
}

// ── Picker
function setColor(hex) {
  currentColor = hex;
  const {r,g,b} = hexToRgb(hex);
  const {h,s,l} = rgbToHsl(r,g,b);

  const sw = document.getElementById('mainSwatch');
  sw.style.background = hex;
  sw.style.boxShadow = `0 8px 40px ${hex}55`;
  sw.classList.remove('empty');

  document.getElementById('hexVal').textContent = hex.toUpperCase();
  document.getElementById('rgbVal').textContent = `${r}, ${g}, ${b}`;
  document.getElementById('hslVal').textContent = `${h}°, ${s}%, ${l}%`;
  document.getElementById('addToPaletteBtn').disabled = false;

  addToHistory(hex);
}

async function triggerPick() {
  if(!window.EyeDropper){
    document.getElementById('unsupported').style.display='block';
    document.getElementById('pickBtn').disabled=true;
    return;
  }
  try {
    const result = await new EyeDropper().open();
    setColor(result.sRGBHex);
  } catch(e) {}
}

// ── Copy
const copyFns = {
  hex: () => document.getElementById('hexVal').textContent,
  rgb: () => { const t=document.getElementById('rgbVal').textContent; return t==='—'?null:`rgb(${t})`; },
  hsl: () => { const t=document.getElementById('hslVal').textContent; if(t==='—')return null; const [h,s,l]=t.split(',').map(x=>x.trim()); return `hsl(${h} ${s} ${l})`; }
};
function copyValue(type) {
  const val = copyFns[type]?.();
  if(!val||val==='—') return;
  navigator.clipboard.writeText(val).then(()=>{
    const fl = document.getElementById(`flash-${type}`);
    fl.classList.add('show');
    setTimeout(()=>fl.classList.remove('show'),400);
    showToast(`Copied ${val}`);
  });
}

// ── History
function addToHistory(hex) {
  colorHistory = colorHistory.filter(c=>c!==hex);
  colorHistory.unshift(hex);
  if(colorHistory.length>40) colorHistory.pop();
  saveHistory();
}

function removeFromHistory(hex) {
  colorHistory = colorHistory.filter(c=>c!==hex);
  saveHistory();
  renderHistory();
}

function confirmClearHistory() {
  showModal('Clear History','Remove all recent colors?', ()=>{
    colorHistory=[];
    saveHistory();
    editingHistory=false;
    renderHistory();
    closeModal();
  });
}

function toggleEditHistory() {
  editingHistory = !editingHistory;
  const btn = document.getElementById('editHistoryBtn');
  btn.textContent = editingHistory ? 'Done' : 'Edit';
  btn.classList.toggle('active-edit', editingHistory);
  renderHistory();
}

function renderHistory() {
  const container = document.getElementById('historySwatches');
  const header    = document.getElementById('historyHeader');
  const empty     = document.getElementById('historyEmpty');
  container.innerHTML = '';

  if(colorHistory.length===0){
    header.style.display='none';
    empty.style.display='block';
    editingHistory=false;
    return;
  }
  header.style.display='flex';
  empty.style.display='none';
  if(editingHistory) container.classList.add('edit-mode');
  else container.classList.remove('edit-mode');

  colorHistory.forEach(hex=>{
    const sw = document.createElement('div');
    sw.className = 'h-swatch';
    sw.style.background = hex;

    const tip = document.createElement('div');
    tip.className = 'hex-tip';
    tip.textContent = hex.toUpperCase();
    sw.appendChild(tip);

    const x = document.createElement('div');
    x.className = 'remove-x';
    x.textContent = '×';
    x.onclick = (e)=>{ e.stopPropagation(); removeFromHistory(hex); };
    sw.appendChild(x);

    if(!editingHistory) sw.onclick = ()=>{ setColor(hex); switchTab('picker'); };
    container.appendChild(sw);
  });
}

// ── Palettes
function createPalette() {
  const input = document.getElementById('newPaletteName');
  const name  = input.value.trim();
  if(!name){ input.focus(); return; }
  palettes.push({ id: Date.now().toString(36), name, colors:[] });
  savePalettes();
  input.value='';
  renderPalettes();
  refreshPaletteSelect();
  showToast('Palette created');
}

function deletePalette(id) {
  const p = palettes.find(p=>p.id===id);
  showModal('Delete Palette', `Delete "${p?.name}"? This cannot be undone.`, ()=>{
    palettes = palettes.filter(p=>p.id!==id);
    savePalettes();
    renderPalettes();
    refreshPaletteSelect();
    closeModal();
  });
}

function renamePalette(id, name) {
  const p = palettes.find(p=>p.id===id);
  if(p&&name.trim()){ p.name=name.trim(); savePalettes(); refreshPaletteSelect(); }
}

function removeColorFromPalette(paletteId, idx) {
  const p = palettes.find(p=>p.id===paletteId);
  if(p){ p.colors.splice(idx,1); savePalettes(); renderPalettes(); }
}

function addCurrentToPalette() {
  if(!currentColor) return;
  const id = document.getElementById('paletteSelect').value;
  if(!id){ showToast('Select a palette first'); return; }
  const p = palettes.find(p=>p.id===id);
  if(!p) return;
  if(p.colors.includes(currentColor)){ showToast('Already in palette'); return; }
  p.colors.push(currentColor);
  savePalettes();
  renderPalettes();
  showToast(`Added to "${p.name}"`);
}

function copyPaletteHex(id) {
  const p = palettes.find(p=>p.id===id);
  if(!p||!p.colors.length) return;
  navigator.clipboard.writeText(p.colors.map(c=>c.toUpperCase()).join(', ')).then(()=>showToast('Hex values copied'));
}

function refreshPaletteSelect() {
  const sel = document.getElementById('paletteSelect');
  const prev = sel.value;
  sel.innerHTML = '<option value="">— Add to palette —</option>';
  palettes.forEach(p=>{
    const o = document.createElement('option');
    o.value=p.id; o.textContent=p.name;
    sel.appendChild(o);
  });
  if(prev) sel.value=prev;
}

function renderPalettes() {
  const list  = document.getElementById('paletteList');
  const empty = document.getElementById('palettesEmpty');
  list.innerHTML='';
  if(!palettes.length){ empty.style.display='block'; return; }
  empty.style.display='none';

  palettes.forEach(p=>{
    const card = document.createElement('div');
    card.className='palette-card';

    // Header
    const hdr = document.createElement('div');
    hdr.className='palette-card-header';

    const nameEl = document.createElement('input');
    nameEl.className='palette-name'; nameEl.type='text';
    nameEl.value=p.name; nameEl.maxLength=30;
    nameEl.title='Click to rename';
    nameEl.onchange=()=>renamePalette(p.id, nameEl.value||p.name);

    const acts = document.createElement('div');
    acts.className='palette-card-actions';

    const copyBtn = document.createElement('button');
    copyBtn.className='icon-btn copy-icon';
    copyBtn.textContent='Copy HEX';
    copyBtn.onclick=()=>copyPaletteHex(p.id);

    const delBtn = document.createElement('button');
    delBtn.className='icon-btn';
    delBtn.textContent='Delete';
    delBtn.onclick=()=>deletePalette(p.id);

    acts.appendChild(copyBtn);
    acts.appendChild(delBtn);
    hdr.appendChild(nameEl);
    hdr.appendChild(acts);
    card.appendChild(hdr);

    // Swatches
    const sw = document.createElement('div');
    sw.className='palette-swatches';

    if(!p.colors.length){
      const hint=document.createElement('span');
      hint.style.cssText='font-family:Space Mono,monospace;font-size:9px;color:var(--muted);letter-spacing:0.06em;text-transform:uppercase;align-self:center;';
      hint.textContent='Pick a color, then add it here';
      sw.appendChild(hint);
    } else {
      p.colors.forEach((hex,i)=>{
        const s=document.createElement('div');
        s.className='p-swatch';
        s.style.background=hex;

        const tip=document.createElement('div');
        tip.className='hex-tip';
        tip.textContent=hex.toUpperCase();
        s.appendChild(tip);

        const x=document.createElement('div');
        x.className='remove-x';
        x.textContent='×';
        x.onclick=(e)=>{e.stopPropagation();removeColorFromPalette(p.id,i);};
        s.appendChild(x);

        s.onclick=()=>{setColor(hex);switchTab('picker');};
        sw.appendChild(s);
      });
    }
    card.appendChild(sw);

    // Color bar
    if(p.colors.length){
      const bar=document.createElement('div');
      bar.className='palette-bar';
      p.colors.forEach(hex=>{
        const seg=document.createElement('div');
        seg.className='palette-bar-seg';
        seg.style.background=hex;
        bar.appendChild(seg);
      });
      card.appendChild(bar);
    }

    list.appendChild(card);
  });
}

// ── Modal
function showModal(title, msg, onConfirm) {
  document.getElementById('modalTitle').textContent=title;
  document.getElementById('modalMsg').textContent=msg;
  document.getElementById('modalConfirmBtn').onclick=onConfirm;
  document.getElementById('confirmModal').classList.add('show');
}
function closeModal(){ document.getElementById('confirmModal').classList.remove('show'); }

// ── Toast
let toastTimer;
function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),1800);
}

// ── Init
loadAll();
if(!window.EyeDropper){
  document.getElementById('unsupported').style.display='block';
  document.getElementById('pickBtn').disabled=true;
}
refreshPaletteSelect();
</script>
